name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - runtime: win-x64
            os: ubuntu-latest
            archive: zip
          - runtime: linux-x64
            os: ubuntu-latest
            archive: tar
          - runtime: linux-arm64
            os: ubuntu-latest
            archive: tar

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish nutclient -c Release -r ${{ matrix.runtime }} -o publish/${{ matrix.runtime }}

      - name: Copy install files
        run: |
          cp nutclient/nutclient.json publish/${{ matrix.runtime }}/
          cp nutclient/nutclient.json.linux-example publish/${{ matrix.runtime }}/
          cp nutclient/nutclient.service publish/${{ matrix.runtime }}/
          cp nutclient/install-service.ps1 publish/${{ matrix.runtime }}/
          cp nutclient/uninstall-service.ps1 publish/${{ matrix.runtime }}/
          cp -r nutclient/scripts publish/${{ matrix.runtime }}/scripts
          cp install.sh publish/${{ matrix.runtime }}/
          cp install.ps1 publish/${{ matrix.runtime }}/

      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        run: |
          cd publish
          tar czf nutclient-${{ matrix.runtime }}.tar.gz ${{ matrix.runtime }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd publish
          zip -r nutclient-${{ matrix.runtime }}.zip ${{ matrix.runtime }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nutclient-${{ matrix.runtime }}
          path: publish/nutclient-${{ matrix.runtime }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/nutclient-win-x64/*
            artifacts/nutclient-linux-x64/*
            artifacts/nutclient-linux-arm64/*
